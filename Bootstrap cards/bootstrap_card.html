<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dishes Cards</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
  <div class="row" id="cardContainer"></div>
</div>

<script>
  // Array of objects
  const dishes = [
    {
      name: "Pizza",
      price: 299,
      image: "https://via.placeholder.com/300x200?text=Pizza"
    },
    {
      name: "Burger",
      price: 199,
      image: "https://via.placeholder.com/300x200?text=Burger"
    },
    {
      name: "Pasta",
      price: 249,
      image: "https://via.placeholder.com/300x200?text=Pasta"
    },
    {
      name: "Biryani",
      price: 349,
      image: "https://via.placeholder.com/300x200?text=Biryani"
    }
  ];

  const container = document.getElementById("cardContainer");

  dishes.map((dish) => {
    container.innerHTML += `
      <div class="col-md-3 mb-4">
        <div class="card h-100">
          <img src="${dish.image}" class="card-img-top" alt="${dish.name}">
          <div class="card-body">
            <h5 class="card-title">${dish.name}</h5>
            <p class="card-text">Price: ₹${dish.price}</p>
            <button class="btn btn-primary">Order Now</button>
          </div>
        </div>
      </div>
    `;
  });
</script>

</body>
</html>
